<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Wise 5 — 단어 학습</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WordWise5">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --surface2: #1e1e2e;
    --border: #2a2a3e;
    --accent: #7c6af7;
    --accent2: #f7c86a;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --text-dim: #7878a0;
    --text-faint: #3a3a55;
    --correct: #6af7c8;
    --wrong: #f76a8a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; right: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(106,247,200,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    padding: 24px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .logo span { color: var(--accent2); }

  /* ── MAIN WRAPPER ── */
  .main { position: relative; z-index: 5; padding: 32px 24px; max-width: 820px; margin: 0 auto; }

  /* ── STEP 1: DAY SELECT ── */
  #screen-select { animation: fadeUp 0.4s ease; }

  .screen-title {
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 1.8rem; font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .screen-sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 32px; }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px; margin-bottom: 32px;
  }
  .day-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 12px;
    padding: 14px 0;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .day-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .mode-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }
  .mode-card:hover { border-color: var(--accent); transform: translateY(-3px); }
  .mode-card.selected { border-color: var(--accent); background: rgba(124,106,247,0.1); }
  .mode-icon { font-size: 2rem; margin-bottom: 8px; }
  .mode-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
  .mode-desc { color: var(--text-dim); font-size: 0.78rem; line-height: 1.4; }

  .btn-start {
    display: block; width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #9b6af7);
    border: none; border-radius: var(--radius);
    color: #fff;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 1px;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,106,247,0.4); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── FLASHCARD ── */
  #screen-flash { display: none; animation: fadeUp 0.4s ease; }

  .progress-bar-wrap {
    height: 4px; background: var(--surface2);
    border-radius: 4px; margin-bottom: 28px; overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .card-counter {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem; color: var(--text-dim);
    text-align: center; margin-bottom: 16px;
  }

  .flashcard-scene {
    perspective: 1200px;
    margin: 0 auto 24px;
    height: 280px;
    cursor: pointer;
  }
  .flashcard {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1);
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px;
    text-align: center;
  }
  .card-back { transform: rotateY(180deg); border-color: var(--accent); }
  .card-label {
    font-size: 0.72rem; font-family: 'Space Mono', monospace;
    color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 12px; border: 1px solid var(--text-faint); border-radius: 20px;
  }
  .card-content {
    font-size: 1.5rem; font-weight: 700; line-height: 1.5;
    font-family: 'Gmarket Sans', sans-serif;
  }
  .card-content.en { font-family: 'Space Mono', monospace; font-size: 1.6rem; color: var(--accent2); }
  .card-hint { font-size: 0.8rem; color: var(--text-dim); margin-top: 16px; }
  .card-tap { font-size: 0.75rem; color: var(--text-faint); margin-top: 24px; }

  .flash-controls { display: flex; gap: 12px; justify-content: center; }
  .btn-icon {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50px;
    padding: 12px 24px;
    cursor: pointer;
    font-family: 'Gmarket Sans', sans-serif;
    font-size: 0.9rem;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.danger:hover { border-color: var(--wrong); color: var(--wrong); }
  .btn-icon.success:hover { border-color: var(--correct); color: var(--correct); }

  /* direction toggle */
  .direction-toggle {
    display: flex; gap: 8px; justify-content: center;
    margin-bottom: 20px;
  }
  .dir-btn {
    padding: 6px 16px;
    border-radius: 20px; font-size: 0.78rem;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  }
  .dir-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(247,200,106,0.1); }

  /* ── TYPING TEST ── */
  #screen-type { display: none; animation: fadeUp 0.4s ease; }

  .type-prompt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    margin-bottom: 20px;
  }
  .prompt-label { font-size: 0.72rem; font-family: 'Space Mono', monospace; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 16px; }
  .prompt-text { font-size: 1.5rem; font-weight: 700; font-family: 'Gmarket Sans', sans-serif; line-height: 1.5; }
  .prompt-text.en { font-family: 'Space Mono', monospace; font-size: 1.6rem; color: var(--accent2); }

  .type-input-wrap { position: relative; margin-bottom: 16px; }
  .type-input {
    width: 100%;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 56px 16px 20px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .type-input:focus { border-color: var(--accent); }
  .type-input.correct-anim { border-color: var(--correct); background: rgba(106,247,200,0.05); }
  .type-input.wrong-anim { border-color: var(--wrong); background: rgba(247,106,138,0.05); animation: shake 0.3s ease; }

  .submit-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: var(--accent);
    border: none; border-radius: 8px;
    color: #fff; width: 36px; height: 36px;
    cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .submit-btn:hover { background: #9b6af7; }

  .feedback {
    min-height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 700;
    font-family: 'Gmarket Sans', sans-serif;
    border-radius: 12px; padding: 12px 20px;
    margin-bottom: 16px;
    transition: all 0.3s;
  }
  .feedback.correct { background: rgba(106,247,200,0.1); color: var(--correct); border: 1px solid rgba(106,247,200,0.3); }
  .feedback.wrong { background: rgba(247,106,138,0.1); color: var(--wrong); border: 1px solid rgba(247,106,138,0.3); }
  .feedback.hint {
    background: rgba(247,200,106,0.1); color: var(--accent2);
    border: 1px solid rgba(247,200,106,0.3);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem; letter-spacing: 1px;
    word-break: break-all; white-space: pre;
  }
  .feedback.hidden { opacity: 0; }

  .type-controls { display: flex; gap: 10px; justify-content: center; }

  /* ── RESULTS ── */
  #screen-result { display: none; animation: fadeUp 0.4s ease; text-align: center; }
  .result-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 24px;
    background: rgba(124,106,247,0.08);
    box-shadow: 0 0 40px rgba(124,106,247,0.2);
  }
  .result-score { font-family: 'Space Mono', monospace; font-size: 2.2rem; font-weight: 700; color: var(--accent); }
  .result-label { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 1px; }
  .result-msg { font-family: 'Gmarket Sans', sans-serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
  .result-sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 32px; }

  .wrong-list { text-align: left; background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 28px; }
  .wrong-list h3 { font-size: 0.8rem; font-family: 'Space Mono', monospace; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 14px; }
  .wrong-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .wrong-item:last-child { border-bottom: none; }
  .wrong-kr { color: var(--text-dim); }
  .wrong-en { font-family: 'Space Mono', monospace; color: var(--accent2); }

  .result-btns { display: flex; gap: 12px; justify-content: center; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  @keyframes shake { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-8px); } 75%{ transform:translateX(8px); } }

  /* ── NAV ── */
  .top-nav {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 28px;
  }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 50px;
    padding: 8px 18px; font-size: 0.82rem; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-info { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--text-dim); }

  @media (max-width: 600px) {
    .day-grid { grid-template-columns: repeat(4,1fr); }
    .mode-grid { grid-template-columns: 1fr; }
    .flashcard-scene { height: 240px; }
    .card-content { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">WORD<span>WISE</span> 5</div>
  <div style="font-size:0.75rem; color:var(--text-dim); font-family:'Space Mono',monospace;">Day 01 – 25</div>
</header>

<div class="main">

  <!-- ── SCREEN 1: SELECT ── -->
  <div id="screen-select">
    <div class="screen-title">오늘 공부할 Day를 선택해요</div>
    <div class="screen-sub">Day를 고르고 학습 모드를 선택하세요</div>

    <div class="day-grid" id="day-grid"></div>

    <div class="screen-title" style="font-size:1.2rem; margin-bottom:16px;">학습 모드</div>
    <div class="mode-grid">
      <div class="mode-card" id="mode-flash" onclick="selectMode('flash')">
        <div class="mode-icon">🃏</div>
        <div class="mode-name">플래시카드</div>
        <div class="mode-desc">카드를 뒤집어 뜻을 확인하며<br>자기 자신을 채점해요</div>
      </div>
      <div class="mode-card" id="mode-type" onclick="selectMode('type')">
        <div class="mode-icon">⌨️</div>
        <div class="mode-name">타이핑 테스트</div>
        <div class="mode-desc">뜻을 보고 영단어를<br>직접 입력해서 확인해요</div>
      </div>
    </div>

    <button class="btn-start" id="start-btn" disabled onclick="startStudy()">시작하기 →</button>
  </div>

  <!-- ── SCREEN 2: FLASHCARD ── -->
  <div id="screen-flash">
    <div class="top-nav">
      <button class="back-btn" onclick="goHome()">← 홈</button>
      <span class="nav-info" id="flash-nav-info"></span>
    </div>

    <div class="direction-toggle">
      <button class="dir-btn active" id="dir-kr" onclick="setDirection('kr')">한→영</button>
      <button class="dir-btn" id="dir-en" onclick="setDirection('en')">영→한</button>
    </div>

    <div class="progress-bar-wrap"><div class="progress-bar" id="flash-progress"></div></div>
    <div class="card-counter" id="flash-counter"></div>

    <div class="flashcard-scene" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-label" id="front-label">문제</div>
          <div class="card-content" id="front-content"></div>
          <div class="card-tap">탭하여 정답 확인 ↓</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">정답</div>
          <div class="card-content" id="back-content"></div>
          <div class="card-hint" id="back-hint"></div>
        </div>
      </div>
    </div>

    <div class="flash-controls">
      <button class="btn-icon danger" onclick="markCard(false)">✗ 몰랐어요</button>
      <button class="btn-icon" onclick="shuffleAndRestart()">🔀 섞기</button>
      <button class="btn-icon success" onclick="markCard(true)">✓ 알았어요</button>
    </div>
  </div>

  <!-- ── SCREEN 3: TYPING TEST ── -->
  <div id="screen-type">
    <div class="top-nav">
      <button class="back-btn" onclick="goHome()">← 홈</button>
      <span class="nav-info" id="type-nav-info"></span>
    </div>

    <div class="direction-toggle">
      <button class="dir-btn active" id="tdir-kr" onclick="setTypeDirection('kr')">한→영 (영단어 입력)</button>
      <button class="dir-btn" id="tdir-en" onclick="setTypeDirection('en')">영→한 (한글 입력)</button>
    </div>

    <div class="progress-bar-wrap"><div class="progress-bar" id="type-progress"></div></div>
    <div class="card-counter" id="type-counter"></div>

    <div class="type-prompt">
      <div class="prompt-label" id="type-prompt-label">문제</div>
      <div class="prompt-text" id="type-prompt-text"></div>
    </div>

    <div class="type-input-wrap">
      <input class="type-input" id="type-input" placeholder="정답을 입력하세요..."
        onkeydown="handleTypeKey(event)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="submit-btn" onclick="checkAnswer()">↵</button>
    </div>

    <div class="feedback hidden" id="type-feedback"></div>

    <div class="type-controls">
      <button class="btn-icon" onclick="skipWord()">⏭ 건너뛰기</button>
      <button class="btn-icon" id="btn-first-letter" onclick="showFirstLetter()">🔤 첫 글자</button>
      <button class="btn-icon" onclick="showHint()">💡 힌트</button>
    </div>
  </div>

  <!-- ── SCREEN 4: RESULT ── -->
  <div id="screen-result">
    <div class="top-nav" style="justify-content:center;">
      <button class="back-btn" onclick="goHome()">← 홈으로</button>
    </div>
    <div class="result-circle">
      <div class="result-score" id="result-score"></div>
      <div class="result-label">정답률</div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-sub" id="result-sub"></div>

    <div class="wrong-list" id="wrong-list" style="display:none;">
      <h3>틀린 단어 복습 📋</h3>
      <div id="wrong-items"></div>
    </div>

    <div class="result-btns">
      <button class="btn-icon" onclick="retryWrong()">🔁 틀린 것만 다시</button>
      <button class="btn-icon" onclick="goHome()">🏠 처음으로</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// WORD DATA  (Day 01 ~ Day 25) — Word Wise 5
// ─────────────────────────────────────────────
const VOCAB = {
  1: [
    {en:"notify",kr:"통지하다, 알리다"},
    {en:"idle",kr:"일을 쉬고 있는, 한가한; 사용[가동]중이 아닌; 게으른, 일을 기피하는"},
    {en:"peel",kr:"껍질을 벗기다"},
    {en:"outbreak",kr:"(질병, 전쟁 등의) 돌발, 돌연한 발생"},
    {en:"release",kr:"내보내다, 방출하다; 공개하다, 발표하다"},
    {en:"seek",kr:"찾다, 구하다, 추구하다"},
    {en:"bond",kr:"유대(감), 결속(감)"},
    {en:"bizarre",kr:"별난, 괴상한"},
    {en:"despair",kr:"절망, 낙담"},
    {en:"submit",kr:"제출하다"},
    {en:"nuclear",kr:"핵의, 핵무기의, 핵무기를 가진"},
    {en:"consume",kr:"소비하다; 먹어 치우다"},
    {en:"reveal",kr:"드러내다; 폭로하다"},
    {en:"reform",kr:"개혁, 혁신, 개선; 개혁하다, 개선하다"},
    {en:"slender",kr:"날씬한, 늘씬한; 빈약한, 충분하지 않은"},
    {en:"autonomy",kr:"자율성, 자발성, 자기주도"},
    {en:"conservative",kr:"보수적인, 변화를 싫어하는"},
    {en:"astonish",kr:"(몹시) 놀라게 하다"},
    {en:"emerge",kr:"드러나다, 서서히 출현하다"},
    {en:"flaw",kr:"흠, 손상; 결함; 오류"},
    {en:"virtue",kr:"미덕, 덕목; 장점, 이점"},
    {en:"supervise",kr:"감독하다, 관리하다"},
    {en:"worldwide",kr:"세계적인"},
    {en:"legacy",kr:"(과거로부터 전해 내려오는) 전통, (후대에게 남기는) 유산"},
    {en:"precise",kr:"정확한, 정밀한; 꼼꼼한, 정교한"},
  ],
  2: [
    {en:"excel",kr:"뛰어나다, 탁월하다"},
    {en:"foster",kr:"장려하다, 발전시키다; 잠시 맡아 기르는"},

// ─────────────────────────────────────────────
// TTS (Text-to-Speech)
// ─────────────────────────────────────────────
const TTS = {
  voices: [],
  rate: 0.9,
  ready: false,

  init() {
    const load = () => {
      this.voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
      this.ready = this.voices.length > 0;
    };
    load();
    speechSynthesis.onvoiceschanged = () => load();
  },

  // 영단어 발음 재생
  speak(text) {
    if (!text) return;
    // beat/defeat 같은 슬래시 표현은 앞부분만 읽기
    const clean = text.split('/')[0].trim();
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(clean);
    utt.lang = 'en-US';
    utt.rate = this.rate;
    // 내장 목소리 우선 (오프라인 가능)
    const local = this.voices.find(v => v.localService && v.lang.startsWith('en'));
    const fallback = this.voices[0];
    if (local) utt.voice = local;
    else if (fallback) utt.voice = fallback;
    speechSynthesis.speak(utt);
  }
};

TTS.init();


let selectedDay = null;
let selectedMode = null;
let currentWords = [];
let currentIndex = 0;
let flashDirection = 'kr'; // kr→en or en→kr
let typeDirection = 'kr';
let isFlipped = false;
let score = { correct: 0, wrong: 0 };
let wrongWords = [];
let hintUsed = false;
let skipped = 0;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  const grid = document.getElementById('day-grid');
  for (let d = 1; d <= 25; d++) {
    const btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.textContent = `Day ${d.toString().padStart(2,'0')}`;
    btn.onclick = () => selectDay(d, btn);
    grid.appendChild(btn);
  }
}

function selectDay(day, btn) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedDay = day;
  checkStartable();
}

function selectMode(mode) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('mode-'+mode).classList.add('selected');
  selectedMode = mode;
  checkStartable();
}

function checkStartable() {
  document.getElementById('start-btn').disabled = !(selectedDay && selectedMode);
}

function startStudy(words) {
  currentWords = words ? [...words] : [...VOCAB[selectedDay]];
  shuffle(currentWords);
  currentIndex = 0;
  score = {correct:0, wrong:0};
  wrongWords = [];
  skipped = 0;

  hide('screen-select');
  if (selectedMode === 'flash') {
    show('screen-flash');
    flashDirection = 'kr';
    updateDirButtons();
    loadFlashCard();
  } else {
    show('screen-type');
    typeDirection = 'kr';
    updateTypeDirButtons();
    loadTypeQuestion();
  }
}

// ─────────────────────────────────────────────
// FLASHCARD
// ─────────────────────────────────────────────
function loadFlashCard() {
  isFlipped = false;
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');

  const w = currentWords[currentIndex];
  updateFlashProgress();

  const frontLabel = document.getElementById('front-label');
  const frontContent = document.getElementById('front-content');
  const backContent = document.getElementById('back-content');
  const backHint = document.getElementById('back-hint');
  const navInfo = document.getElementById('flash-nav-info');

  navInfo.textContent = `Day ${selectedDay} · ${currentWords.length}개 단어 (WW5)`;

  if (flashDirection === 'kr') {
    frontLabel.textContent = '한국어 뜻';
    frontContent.className = 'card-content';
    frontContent.textContent = w.kr;
    backContent.className = 'card-content en';
    backContent.textContent = w.en;
    backHint.textContent = '';
  } else {
    frontLabel.textContent = '영단어';
    frontContent.className = 'card-content en';
    frontContent.textContent = w.en;
    backContent.className = 'card-content';
    backContent.textContent = w.kr;
    backHint.textContent = '';
  }
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  // 카드 뒤집으면 영단어 발음
  if (isFlipped) {
    TTS.speak(currentWords[currentIndex].en);
  }
}

function markCard(knew) {
  // 알아요/몰라요 누를 때도 발음
  TTS.speak(currentWords[currentIndex].en);
  if (knew) { score.correct++; }
  else { score.wrong++; wrongWords.push(currentWords[currentIndex]); }
  nextFlash();
}

function nextFlash() {
  currentIndex++;
  if (currentIndex >= currentWords.length) {
    showResult();
  } else {
    loadFlashCard();
  }
}

function shuffleAndRestart() {
  shuffle(currentWords);
  currentIndex = 0;
  score = {correct:0, wrong:0};
  wrongWords = [];
  loadFlashCard();
}

function updateFlashProgress() {
  const pct = ((currentIndex) / currentWords.length) * 100;
  document.getElementById('flash-progress').style.width = pct + '%';
  document.getElementById('flash-counter').textContent = `${currentIndex + 1} / ${currentWords.length}`;
}

function setDirection(dir) {
  flashDirection = dir;
  document.getElementById('dir-kr').classList.toggle('active', dir === 'kr');
  document.getElementById('dir-en').classList.toggle('active', dir === 'en');
  loadFlashCard();
}

function updateDirButtons() {
  document.getElementById('dir-kr').classList.add('active');
  document.getElementById('dir-en').classList.remove('active');
}

// ─────────────────────────────────────────────
// TYPING TEST
// ─────────────────────────────────────────────
function loadTypeQuestion() {
  hintUsed = false;
  const w = currentWords[currentIndex];

  const pct = (currentIndex / currentWords.length) * 100;
  document.getElementById('type-progress').style.width = pct + '%';
  document.getElementById('type-counter').textContent = `${currentIndex + 1} / ${currentWords.length}`;
  document.getElementById('type-nav-info').textContent = `Day ${selectedDay} · ${currentWords.length}개 단어`;

  const promptLabel = document.getElementById('type-prompt-label');
  const promptText = document.getElementById('type-prompt-text');

  if (typeDirection === 'kr') {
    promptLabel.textContent = '한국어 뜻 → 영단어 입력';
    promptText.className = 'prompt-text';
    promptText.textContent = w.kr;
  } else {
    promptLabel.textContent = '영단어 → 한국어 입력';
    promptText.className = 'prompt-text en';
    promptText.textContent = w.en;
  }

  const input = document.getElementById('type-input');
  input.value = '';
  input.className = 'type-input';
  input.placeholder = typeDirection === 'kr' ? '영단어를 입력하세요...' : '한국어 뜻을 입력하세요...';
  input.focus();

  setFeedback('', '');
}

function checkAnswer() {
  const input = document.getElementById('type-input');
  const userAns = input.value.trim().toLowerCase();
  if (!userAns) return;

  const w = currentWords[currentIndex];
  const correct = typeDirection === 'kr' ? w.en.toLowerCase() : w.kr.toLowerCase();

  // 정답 후보 목록: 세미콜론·쉼표로 구분된 여러 표현을 각각 허용
  // 단, 각 후보는 공백 정규화 후 완전 일치만 허용 (부분 일치 금지)
  const normalize = s => s.replace(/\s+/g, ' ').trim();
  const candidates = correct
    .split(/[;,]/)
    .map(s => normalize(s))
    .filter(s => s.length > 0);

  const userNorm = normalize(userAns);
  const isCorrect = candidates.some(c => c === userNorm);

  if (isCorrect) {
    score.correct++;
    input.className = 'type-input correct-anim';
    setFeedback('✓ 정답이에요! 🎉', 'correct');
    TTS.speak(w.en);
    setTimeout(() => nextType(), 900);
  } else {
    score.wrong++;
    wrongWords.push(w);
    input.className = 'type-input wrong-anim';
    setFeedback(`✗ 정답: ${typeDirection === 'kr' ? w.en : w.kr}`, 'wrong');
    TTS.speak(w.en);
    setTimeout(() => nextType(), 1600);
  }
}

function nextType() {
  currentIndex++;
  if (currentIndex >= currentWords.length) {
    showResult();
  } else {
    loadTypeQuestion();
  }
}

function skipWord() {
  skipped++;
  wrongWords.push(currentWords[currentIndex]);
  setFeedback(`→ 건너뜀: ${currentWords[currentIndex].en}`, 'wrong');
  setTimeout(() => nextType(), 800);
}

// 띄어쓰기 구조를 유지하며 마스킹하는 헬퍼
function maskAnswer(answer, revealLen) {
  const words = answer.split(' ');
  let revealed = revealLen;
  const masked = words.map(word => {
    if (revealed <= 0) {
      return '_'.repeat(word.length);
    } else if (revealed >= word.length) {
      revealed -= word.length;
      return word;
    } else {
      const shown = word.slice(0, revealed);
      const hidden = '_'.repeat(word.length - revealed);
      revealed = 0;
      return shown + hidden;
    }
  });
  return masked.join(' ');
}

function showFirstLetter() {
  const w = currentWords[currentIndex];
  const answer = typeDirection === 'kr' ? w.en : w.kr;
  const hintBody = maskAnswer(answer, 1);
  const el = document.getElementById('type-feedback');
  el.className = 'feedback hint';
  el.textContent = '🔤 첫 글자: ' + hintBody;
  const input = document.getElementById('type-input');
  if (!input.value) {
    input.value = answer[0];
    input.focus();
    input.setSelectionRange(1, 1);
  }
}

function showHint() {
  const w = currentWords[currentIndex];
  const answer = typeDirection === 'kr' ? w.en : w.kr;
  const nonSpaceLen = answer.replace(/ /g, '').length;
  const revealLen = Math.ceil(nonSpaceLen / 3);
  const hintBody = maskAnswer(answer, revealLen);
  const el = document.getElementById('type-feedback');
  el.className = 'feedback hint';
  el.textContent = '💡 힌트: ' + hintBody;
}

function setFeedback(msg, type) {
  const el = document.getElementById('type-feedback');
  if (!type || type === 'hidden') {
    el.className = 'feedback hidden';
    el.textContent = '';
  } else {
    el.className = 'feedback ' + type;
    el.textContent = msg;
  }
}

function handleTypeKey(e) {
  if (e.key === 'Enter') checkAnswer();
}

function setTypeDirection(dir) {
  typeDirection = dir;
  document.getElementById('tdir-kr').classList.toggle('active', dir === 'kr');
  document.getElementById('tdir-en').classList.toggle('active', dir === 'en');
  loadTypeQuestion();
}

function updateTypeDirButtons() {
  document.getElementById('tdir-kr').classList.add('active');
  document.getElementById('tdir-en').classList.remove('active');
}

// ─────────────────────────────────────────────
// RESULT
// ─────────────────────────────────────────────
function showResult() {
  hide('screen-flash'); hide('screen-type');
  show('screen-result');

  const total = score.correct + score.wrong;
  const pct = total > 0 ? Math.round((score.correct / total) * 100) : 0;

  document.getElementById('result-score').textContent = pct + '%';

  let msg, sub;
  if (pct >= 90) { msg = '완벽해요! 🏆'; sub = `${total}개 중 ${score.correct}개 정답! 훌륭해요.`; }
  else if (pct >= 70) { msg = '잘했어요! 👍'; sub = `${total}개 중 ${score.correct}개 정답. 조금만 더!`; }
  else if (pct >= 50) { msg = '절반 성공! 💪'; sub = `${total}개 중 ${score.correct}개 정답. 다시 도전해봐요.`; }
  else { msg = '더 연습해봐요! 📚'; sub = `${total}개 중 ${score.correct}개 정답. 파이팅!`; }

  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  // wrong list
  const uniqueWrong = [...new Map(wrongWords.map(w => [w.en, w])).values()];
  if (uniqueWrong.length > 0) {
    const wl = document.getElementById('wrong-list');
    wl.style.display = 'block';
    const items = document.getElementById('wrong-items');
    items.innerHTML = uniqueWrong.map(w => `
      <div class="wrong-item">
        <span class="wrong-kr">${w.kr.length > 30 ? w.kr.slice(0,30)+'…' : w.kr}</span>
        <span class="wrong-en">${w.en}</span>
      </div>
    `).join('');
  }
}

function retryWrong() {
  if (wrongWords.length === 0) { goHome(); return; }
  const unique = [...new Map(wrongWords.map(w => [w.en, w])).values()];
  hide('screen-result');
  document.getElementById('wrong-list').style.display = 'none';
  document.getElementById('wrong-items').innerHTML = '';
  startStudy(unique);
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function goHome() {
  hide('screen-flash'); hide('screen-type'); hide('screen-result');
  show('screen-select');
  document.getElementById('wrong-list').style.display = 'none';
  document.getElementById('wrong-items').innerHTML = '';
  document.getElementById('type-feedback').className = 'feedback hidden';
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error', e));
  });
}
